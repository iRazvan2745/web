name: irazz.lol

services:
  postgres:
    image: postgres
    container_name: irazz.lol-postgres
    environment:
      POSTGRES_DB: irazz.lol
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5450:5432"
    volumes:
      - irazz.lol_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  irazz.lol_postgres_data:
